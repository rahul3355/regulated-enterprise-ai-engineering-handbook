name: Spellcheck

on:
  push:
    branches: [main]
    paths: ["**.md"]
  pull_request:
    branches: [main]
    paths: ["**.md"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spellcheck:
    name: Spellcheck Content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run spellcheck
        uses: streetsidesoftware/cspell-action@v6
        with:
          files: "**/*.md"
          config: "cspell.json"
          incremental_files_only: false
          # Set to true to block PRs on spelling errors
          # Set to false for warnings only
          strict: false

      - name: Report unknown words
        if: always()
        run: |
          echo "Note: Technical terms, product names, and acronyms may be flagged as unknown."
          echo "Add legitimate terms to cspell.json to reduce false positives."
          echo "Review the cspell-output.txt artifact for the full list of flagged words."

      - name: Upload cspell output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cspell-output
          path: cspell-output.txt
          retention-days: 7
          if-no-files-found: ignore
